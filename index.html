<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>多维数据透视表引擎</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <h1>多维数据透视表引擎</h1>
      <div class="stats">
        <span id="recordCount">数据加载中...</span>
      </div>
    </header>
    
    <div class="main-container">
      <aside class="field-panel">
        <h3>可用字段</h3>
        <div id="fieldList" class="field-list"></div>
      </aside>
      
      <div class="workspace">
        <div id="compareBanner" class="compare-banner" style="display:none">
          <span class="compare-banner-text">📊 对比模式 — 维度配置已锁定</span>
          <button id="exitCompareBannerBtn" class="btn btn-default btn-sm">退出对比</button>
        </div>
        <div class="drop-zones">
          <div class="drop-zone" id="filterZone">
            <div class="zone-title">筛选区域</div>
            <div class="zone-content" data-zone="filter"></div>
          </div>
          
          <div class="drop-zone" id="columnsZone">
            <div class="zone-title">列维度</div>
            <div class="zone-content" data-zone="columns"></div>
          </div>
          
          <div class="drop-zone" id="rowsZone">
            <div class="zone-title">行维度</div>
            <div class="zone-content" data-zone="rows"></div>
          </div>
          
          <div class="drop-zone" id="valuesZone">
            <div class="zone-title">值区域</div>
            <div class="zone-content" data-zone="values"></div>
          </div>
        </div>
        
        <div class="pivot-chart-wrapper">
          <div class="pivot-container">
            <div id="pivotTable" class="pivot-table"></div>
          </div>
          <div class="chart-panel" id="chartPanel">
            <div class="chart-header">
              <div class="chart-title" id="chartTitle">图表可视化</div>
              <div class="chart-type-buttons">
                <button class="chart-type-btn active" data-type="bar">柱状图</button>
                <button class="chart-type-btn" data-type="line">折线图</button>
                <button class="chart-type-btn" data-type="pie">饼图</button>
              </div>
            </div>
            <div class="chart-canvas-wrapper" id="chartCanvasWrapper"></div>
          </div>
        </div>
      </div>
    </div>
    
    <div id="snapshotPanel" class="snapshot-panel">
      <div class="snapshot-panel-header">
        <span class="snapshot-panel-title">📸 快照管理</span>
        <button id="saveSnapshotBtn" class="btn btn-primary btn-sm">保存快照</button>
      </div>
      <div id="snapshotList" class="snapshot-list">
        <div class="snapshot-empty">暂无快照</div>
      </div>
      <div id="snapshotCompare" class="snapshot-compare">
        <div class="compare-title">差异对比</div>
        <div class="compare-row">
          <select id="compareLeft" class="compare-select"><option value="">选择快照A</option></select>
          <span class="compare-vs">vs</span>
          <select id="compareRight" class="compare-select"><option value="">选择快照B</option></select>
        </div>
        <div class="compare-actions">
          <button id="startCompareBtn" class="btn btn-primary btn-sm" disabled>开始对比</button>
          <button id="exitCompareBtn" class="btn btn-default btn-sm" style="display:none">退出对比</button>
        </div>
      </div>
    </div>

    <div id="modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="modalTitle"></h3>
          <button class="close-btn" id="closeModal">&times;</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
      </div>
    </div>

    <div id="drillDownPanel" class="drill-panel"></div>
  </div>
  
  <script type="module" src="/src/main.js"></script>
</body>
</html>
